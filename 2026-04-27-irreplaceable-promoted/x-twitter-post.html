<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesse Stafford Coaching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 15px;
      line-height: 1.55;
      color: #333333;
      background: #ffffff;
      margin: 0;
      padding: 48px 24px;
    }
    .content {
      max-width: 680px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #100299;
      margin: 0 0 0.75em;
      line-height: 1.25;
    }
    h2 {
      font-size: 17px;
      font-weight: 600;
      color: #100299;
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
    }
    p {
      margin: 0 0 1.25em;
    }
    ul {
      margin: 0 0 1.25em;
      padding-left: 1.5em;
    }
    li {
      margin-bottom: 0.4em;
    }
    strong {
      font-weight: 700;
      color: #111111;
    }
    a {
      color: #100299;
      text-decoration: underline;
    }
    a:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="content">
<p>&quot;We can't afford to lose you in this role&quot; is not a compliment.</p>

<p>It's the reason you're not getting promoted.</p>

<p>If you are irreplaceable to your team, you are also not promotable. Train your replacement. That is the job.</p>

<p>#leadership #techleadership</p>
  </div>
</body>
</html>
